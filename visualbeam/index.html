<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisualBeam Inspector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            overflow: hidden;
        }
        #app {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #toolbar {
            height: 48px;
            background: #2a2a2a;
            border-bottom: 1px solid #3a3a3a;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 16px;
        }
        #game-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
        }
        .tool-group {
            display: flex;
            gap: 8px;
            padding: 0 8px;
            border-right: 1px solid #3a3a3a;
        }
        .tool-group:last-child {
            border-right: none;
        }
        button {
            padding: 6px 12px;
            background: #3a3a3a;
            color: #e0e0e0;
            border: 1px solid #4a4a4a;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        button:hover {
            background: #4a4a4a;
            border-color: #5a5a5a;
        }
        button.active {
            background: #0066cc;
            border-color: #0077ee;
        }
        select {
            padding: 6px 8px;
            background: #3a3a3a;
            color: #e0e0e0;
            border: 1px solid #4a4a4a;
            border-radius: 4px;
            font-size: 13px;
        }
        #status {
            margin-left: auto;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="toolbar">
            <div class="tool-group">
                <button id="tool-select" class="active">Select</button>
                <button id="tool-mark">Mark</button>
                <button id="tool-annotate">Annotate</button>
            </div>
            <div class="tool-group">
                <select id="defect-type">
                    <option value="none">No Defect</option>
                    <option value="corrosion">Corrosion</option>
                    <option value="crack">Crack</option>
                    <option value="deformation">Deformation</option>
                    <option value="missing">Missing</option>
                </select>
                <select id="severity">
                    <option value="1">Minor</option>
                    <option value="2">Moderate</option>
                    <option value="3">Severe</option>
                    <option value="4">Critical</option>
                </select>
            </div>
            <div class="tool-group">
                <button id="clear-all">Clear All</button>
                <button id="export">Export</button>
            </div>
            <div id="status">Ready</div>
        </div>
        <div id="game-container"></div>
    </div>
    <script type="module" src="/src/main-refactored.ts"></script>
</body>
</html>
