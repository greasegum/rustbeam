<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisualBeam Inspector</title>
    <link rel="stylesheet" href="visualbeam.css">
</head>
<body>
    <!-- Top Control Band -->
    <header class="control-band">
        <div class="control-group">
            <div class="brand">
                <svg class="logo" width="20" height="20" viewBox="0 0 20 20">
                    <rect x="2" y="4" width="16" height="2" fill="currentColor"/>
                    <rect x="8" y="6" width="4" height="8" fill="currentColor"/>
                    <rect x="2" y="14" width="16" height="2" fill="currentColor"/>
                </svg>
                <span class="brand-text">VisualBeam</span>
            </div>
        </div>

        <div class="control-group beam-config">
            <label class="control-label">Profile</label>
            <select class="control-select" id="beam-profile">
                <option value="36wf300">36" WF 300#</option>
                <option value="30wf210">30" WF 210#</option>
                <option value="24wf160">24" WF 160#</option>
                <option value="21wf142">21" WF 142#</option>
                <option value="18wf114">18" WF 114#</option>
                <option value="14wf74">14" WF 74#</option>
                <option value="12wf58">12" WF 58#</option>
                <option value="10wf49">10" WF 49#</option>
                <option value="8wf31">8" WF 31#</option>
            </select>
            
            <label class="control-label">Length</label>
            <input type="number" class="control-input" id="beam-length" value="40" min="1" max="200">
            <span class="control-unit">ft</span>
            
            <div class="control-divider"></div>
            
            <button class="control-toggle" id="top-flange-toggle" title="Toggle top flange visibility">
                <svg width="16" height="16" viewBox="0 0 16 16">
                    <rect x="1" y="3" width="14" height="2" fill="currentColor" opacity="0.3" class="top-flange"/>
                    <rect x="6" y="5" width="4" height="6" fill="currentColor"/>
                    <rect x="1" y="11" width="14" height="2" fill="currentColor"/>
                </svg>
            </button>
            
            <label class="control-label">Grid</label>
            <select class="control-select control-select-sm" id="grid-size">
                <option value="1">1"</option>
                <option value="6">6"</option>
                <option value="12" selected>12"</option>
            </select>
        </div>

        <div class="control-group tools">
            <div class="tool-set">
                <button class="tool-btn active" data-tool="select" title="Select [S]">
                    <svg width="14" height="14" viewBox="0 0 14 14">
                        <path d="M2 2 L10 6 L6 8 L4 12 L2 2" fill="currentColor"/>
                    </svg>
                </button>
                <button class="tool-btn" data-tool="pan" title="Pan [H]">
                    <svg width="14" height="14" viewBox="0 0 14 14">
                        <path d="M7 2 L7 12 M2 7 L12 7 M4 4 L2 7 L4 10 M10 4 L12 7 L10 10" stroke="currentColor" fill="none"/>
                    </svg>
                </button>
                <button class="tool-btn" data-tool="mark" title="Mark Defect [M]">
                    <svg width="14" height="14" viewBox="0 0 14 14">
                        <rect x="3" y="3" width="8" height="8" stroke="currentColor" fill="none" stroke-dasharray="2"/>
                    </svg>
                </button>
                <button class="tool-btn" data-tool="measure" title="Measure [D]">
                    <svg width="14" height="14" viewBox="0 0 14 14">
                        <path d="M2 12 L12 12 M2 9 L2 12 M12 9 L12 12 M7 10 L7 12" stroke="currentColor" fill="none"/>
                    </svg>
                </button>
                <button class="tool-btn" data-tool="note" title="Add Note [N]">
                    <svg width="14" height="14" viewBox="0 0 14 14">
                        <path d="M2 3 L10 3 L10 9 L7 12 L2 12 Z M7 9 L7 12 L10 9" stroke="currentColor" fill="none"/>
                    </svg>
                </button>
            </div>

            <div class="control-divider"></div>

            <div class="condition-states">
                <label class="control-label">CS</label>
                <button class="cs-btn cs-1 active" data-cs="1" title="Condition State 1 - Good">1</button>
                <button class="cs-btn cs-2" data-cs="2" title="Condition State 2 - Fair">2</button>
                <button class="cs-btn cs-3" data-cs="3" title="Condition State 3 - Poor">3</button>
                <button class="cs-btn cs-4" data-cs="4" title="Condition State 4 - Severe">4</button>
            </div>
        </div>

        <div class="control-group view-controls">
            <button class="view-btn zoom-out" title="Zoom Out [-]">
                <svg width="14" height="14" viewBox="0 0 14 14">
                    <circle cx="6" cy="6" r="4" stroke="currentColor" fill="none"/>
                    <line x1="9" y1="9" x2="12" y2="12" stroke="currentColor"/>
                    <line x1="4" y1="6" x2="8" y2="6" stroke="currentColor"/>
                </svg>
            </button>
            <span class="zoom-level">100%</span>
            <button class="view-btn zoom-in" title="Zoom In [+]">
                <svg width="14" height="14" viewBox="0 0 14 14">
                    <circle cx="6" cy="6" r="4" stroke="currentColor" fill="none"/>
                    <line x1="9" y1="9" x2="12" y2="12" stroke="currentColor"/>
                    <line x1="4" y1="6" x2="8" y2="6" stroke="currentColor"/>
                    <line x1="6" y1="4" x2="6" y2="8" stroke="currentColor"/>
                </svg>
            </button>
            <button class="view-btn zoom-fit" title="Fit [F]">
                <svg width="14" height="14" viewBox="0 0 14 14">
                    <rect x="2" y="2" width="10" height="10" stroke="currentColor" fill="none"/>
                    <path d="M5 5 L9 9 M9 5 L5 9" stroke="currentColor"/>
                </svg>
            </button>
            
            <div class="control-divider"></div>
            
            <button class="action-btn" id="export-btn">
                <svg width="14" height="14" viewBox="0 0 14 14">
                    <path d="M7 2 L7 9 M4 6 L7 9 L10 6 M2 11 L12 11" stroke="currentColor" fill="none" stroke-width="1.5"/>
                </svg>
                Export
            </button>
        </div>
    </header>

    <!-- Main Canvas Area -->
    <main class="canvas-area">
        <svg id="beam-canvas" width="100%" height="100%">
            <!-- Define patterns for condition states -->
            <defs>
                <pattern id="grid-pattern" x="0" y="0" width="1" height="1" patternUnits="userSpaceOnUse">
                    <line x1="0" y1="0" x2="0" y2="1" stroke="#e0e0e0" stroke-width="0.5"/>
                    <line x1="0" y1="0" x2="1" y2="0" stroke="#e0e0e0" stroke-width="0.5"/>
                </pattern>
            </defs>
            
            <!-- Canvas will be populated by JavaScript -->
            <g id="grid-layer"></g>
            <g id="beam-layer"></g>
            <g id="defect-layer"></g>
            <g id="annotation-layer"></g>
            <g id="overlay-layer"></g>
        </svg>
        
        <!-- Cursor coordinates display -->
        <div class="cursor-info">
            <span id="cursor-x">0"</span>, <span id="cursor-y">0"</span>
        </div>
    </main>

    <!-- Bottom Status Bar -->
    <footer class="status-bar">
        <div class="status-group">
            <span class="status-item">
                <span class="status-label">Beam:</span>
                <span id="status-beam">36" WF 300#</span>
            </span>
            <span class="status-item">
                <span class="status-label">Length:</span>
                <span id="status-length">40'-0"</span>
            </span>
            <span class="status-item">
                <span class="status-label">Scale:</span>
                <span id="status-scale">1:48</span>
            </span>
        </div>
        
        <div class="status-group">
            <span class="status-item">
                <span class="status-label">Grid:</span>
                <span id="status-grid">12" × 12"</span>
            </span>
            <span class="status-item">
                <span class="status-label">View:</span>
                <span id="status-view">Elevation</span>
            </span>
        </div>

        <div class="status-group">
            <span class="status-item" id="status-mode">
                <span class="status-indicator"></span>
                <span id="mode-text">Ready</span>
            </span>
            <span class="status-item status-coordinates">
                <span id="status-coords">0, 0</span>
            </span>
        </div>
    </footer>

    <!-- Export Dialog -->
    <dialog id="export-dialog" class="dialog">
        <div class="dialog-header">
            <h3>Export Drawing</h3>
            <button class="dialog-close">&times;</button>
        </div>
        <div class="dialog-content">
            <div class="export-options">
                <label class="export-option">
                    <input type="radio" name="export-format" value="pdf" checked>
                    <span>PDF Document</span>
                </label>
                <label class="export-option">
                    <input type="radio" name="export-format" value="dxf">
                    <span>AutoCAD DXF</span>
                </label>
                <label class="export-option">
                    <input type="radio" name="export-format" value="svg">
                    <span>SVG Vector</span>
                </label>
                <label class="export-option">
                    <input type="radio" name="export-format" value="png">
                    <span>PNG Image</span>
                </label>
            </div>
        </div>
        <div class="dialog-footer">
            <button class="btn-cancel">Cancel</button>
            <button class="btn-export">Export</button>
        </div>
    </dialog>

    <script src="visualbeam.js"></script>
</body>
</html>
