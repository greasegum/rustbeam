<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VisualBeam Inspector - Mobile Optimized</title>
    <link rel="stylesheet" href="visualbeam-v3.css">
</head>
<body>
    <!-- Main Header -->
    <header class="main-header">
        <div class="header-top">
            <div class="brand">
                <svg class="logo" width="20" height="20" viewBox="0 0 20 20">
                    <rect x="2" y="4" width="16" height="2" fill="currentColor"/>
                    <rect x="8" y="6" width="4" height="8" fill="currentColor"/>
                    <rect x="2" y="14" width="16" height="2" fill="currentColor"/>
                </svg>
                <span>VisualBeam</span>
            </div>
            <div class="beam-info">
                <span id="project-name">Bridge A-47</span>
                <span class="separator">|</span>
                <span id="beam-id">Beam 2</span>
                <span class="separator">|</span>
                <span id="view-orientation" style="color: #FFD700; font-weight: 600;">SOUTH ELEVATION</span>
            </div>
            <button class="menu-btn" id="menu-toggle">
                <svg width="20" height="20" viewBox="0 0 20 20">
                    <rect x="3" y="5" width="14" height="2" fill="currentColor"/>
                    <rect x="3" y="9" width="14" height="2" fill="currentColor"/>
                    <rect x="3" y="13" width="14" height="2" fill="currentColor"/>
                </svg>
            </button>
        </div>
        
        <!-- Mode Tabs -->
        <div class="mode-tabs">
            <button class="mode-tab active" data-mode="edit">
                <svg width="16" height="16" viewBox="0 0 16 16">
                    <path d="M2 10 L10 2 L14 6 L6 14 L2 14 Z" stroke="currentColor" fill="none"/>
                </svg>
                Edit
            </button>
            <button class="mode-tab" data-mode="annotate">
                <svg width="16" height="16" viewBox="0 0 16 16">
                    <path d="M3 3 L13 3 L13 10 L8 10 L5 13 L5 10 L3 10 Z" stroke="currentColor" fill="none"/>
                </svg>
                Annotate
            </button>
            <button class="mode-tab" data-mode="view">
                <svg width="16" height="16" viewBox="0 0 16 16">
                    <circle cx="8" cy="8" r="3" stroke="currentColor" fill="none"/>
                    <path d="M2 8 Q8 2, 14 8 Q8 14, 2 8" stroke="currentColor" fill="none"/>
                </svg>
                View/Export
            </button>
        </div>
    </header>

    <!-- Mode-Specific Toolbars -->
    <div class="toolbar-container">
        <!-- Edit Mode Toolbar -->
        <div class="mode-toolbar active" id="edit-toolbar">
            <div class="tool-group">
                <button class="tool-btn active" data-tool="mark" title="Mark Grid">
                    <svg width="18" height="18" viewBox="0 0 18 18">
                        <rect x="3" y="3" width="12" height="12" stroke="currentColor" fill="none"/>
                        <rect x="6" y="6" width="6" height="6" fill="currentColor"/>
                    </svg>
                </button>
                <button class="tool-btn" data-tool="select" title="Select Region">
                    <svg width="18" height="18" viewBox="0 0 18 18">
                        <rect x="3" y="3" width="12" height="12" stroke="currentColor" fill="none" stroke-dasharray="2"/>
                    </svg>
                </button>
                <button class="tool-btn" data-tool="erase" title="Erase">
                    <svg width="18" height="18" viewBox="0 0 18 18">
                        <path d="M5 5 L13 13 M13 5 L5 13" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </button>
            </div>
            
            <div class="tool-divider"></div>
            
            <div class="tool-group cs-group">
                <label>CS:</label>
                <button class="cs-btn cs-1 active" data-cs="1">1</button>
                <button class="cs-btn cs-2" data-cs="2">2</button>
                <button class="cs-btn cs-3" data-cs="3">3</button>
                <button class="cs-btn cs-4" data-cs="4">4</button>
                <button class="cs-btn cs-holes" data-cs="holes" style="color: white; background: #666;">H</button>
            </div>
            
            <div class="tool-divider"></div>
            
            <div class="tool-group">
                <label>Grid:</label>
                <span id="grid-size">1"</span>
                <button class="tool-btn" id="toggle-grid" title="Toggle Grid">
                    <svg width="18" height="18" viewBox="0 0 18 18">
                        <path d="M3 3 L15 3 M3 9 L15 9 M3 15 L15 15 M3 3 L3 15 M9 3 L9 15 M15 3 L15 15" stroke="currentColor"/>
                    </svg>
                </button>
            </div>
            
            <div class="tool-group ml-auto">
                <button class="action-btn" id="clear-all">Clear All</button>
            </div>
        </div>

        <!-- Annotate Mode Toolbar -->
        <div class="mode-toolbar" id="annotate-toolbar">
            <div class="tool-group">
                <button class="tool-btn" data-tool="dimension" title="Add Dimension">
                    <svg width="18" height="18" viewBox="0 0 18 18">
                        <path d="M3 9 L15 9 M3 7 L3 11 M15 7 L15 11" stroke="currentColor"/>
                    </svg>
                </button>
                <button class="tool-btn" data-tool="text" title="Add Text">
                    <svg width="18" height="18" viewBox="0 0 18 18">
                        <text x="9" y="12" text-anchor="middle" font-size="14" fill="currentColor">T</text>
                    </svg>
                </button>
                <button class="tool-btn" data-tool="arrow" title="Add Arrow">
                    <svg width="18" height="18" viewBox="0 0 18 18">
                        <path d="M4 14 L14 4 M11 4 L14 4 L14 7" stroke="currentColor" fill="none"/>
                    </svg>
                </button>
                <button class="tool-btn" data-tool="photo" title="Photo Reference">
                    <svg width="18" height="18" viewBox="0 0 18 18">
                        <rect x="3" y="4" width="12" height="10" stroke="currentColor" fill="none"/>
                        <circle cx="9" cy="9" r="2" stroke="currentColor" fill="none"/>
                    </svg>
                </button>
            </div>
            
            <div class="tool-divider"></div>
            
            <div class="tool-group">
                <label>Style:</label>
                <select id="annotation-style">
                    <option value="default">Default</option>
                    <option value="callout">Callout</option>
                    <option value="cloud">Cloud</option>
                </select>
            </div>
            
            <div class="tool-group ml-auto">
                <button class="action-btn" id="delete-annotation">Delete</button>
            </div>
        </div>

        <!-- View/Export Mode Toolbar -->
        <div class="mode-toolbar" id="view-toolbar">
            <div class="tool-group">
                <button class="tool-btn" data-tool="pan" title="Pan">
                    <svg width="18" height="18" viewBox="0 0 18 18">
                        <path d="M9 3 L9 15 M3 9 L15 9 M5 5 L3 9 L5 13 M13 5 L15 9 L13 13" stroke="currentColor" fill="none"/>
                    </svg>
                </button>
                <button class="tool-btn" data-tool="zoom" title="Zoom">
                    <svg width="18" height="18" viewBox="0 0 18 18">
                        <circle cx="7" cy="7" r="4" stroke="currentColor" fill="none"/>
                        <line x1="10" y1="10" x2="14" y2="14" stroke="currentColor"/>
                    </svg>
                </button>
            </div>
            
            <div class="tool-divider"></div>
            
            <div class="tool-group">
                <button class="zoom-btn" id="zoom-out">−</button>
                <span class="zoom-level">100%</span>
                <button class="zoom-btn" id="zoom-in">+</button>
                <button class="zoom-btn" id="zoom-fit">⊡</button>
            </div>
            
            <div class="tool-divider"></div>
            
            <div class="tool-group">
                <label>
                    <input type="checkbox" id="show-dimensions" checked>
                    Dimensions
                </label>
                <label>
                    <input type="checkbox" id="show-zones">
                    Zones
                </label>
                <label>
                    <input type="checkbox" id="show-grid" checked>
                    Grid
                </label>
                <label>
                    <input type="checkbox" id="show-bearings" checked>
                    Bearings
                </label>
                <label>
                    <input type="checkbox" id="show-abutments" checked>
                    Abutments
                </label>
            </div>
            
            <div class="tool-group ml-auto">
                <button class="action-btn primary" id="export-btn">
                    Export
                    <svg width="16" height="16" viewBox="0 0 16 16">
                        <path d="M8 2 L8 10 M5 7 L8 10 L11 7 M3 14 L13 14" stroke="currentColor" fill="none"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Main Canvas Area -->
    <main class="canvas-container">
        <svg id="beam-canvas" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid meet">
            <defs>
                <!-- Grid Pattern -->
                <pattern id="grid-pattern" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
                    <rect width="4" height="4" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="0.5"/>
                </pattern>
                
                <!-- Zone Patterns -->
                <pattern id="zone-a" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
                    <rect width="20" height="20" fill="rgba(255,0,0,0.05)"/>
                </pattern>
                <pattern id="zone-b" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
                    <rect width="20" height="20" fill="rgba(255,165,0,0.05)"/>
                </pattern>
                <pattern id="zone-c" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
                    <rect width="20" height="20" fill="rgba(255,255,0,0.05)"/>
                </pattern>
            </defs>
            
            <!-- Layers -->
            <g id="background-layer"></g>
            <g id="abutment-layer"></g>
            <g id="bearing-layer"></g>
            <g id="zone-layer"></g>
            <g id="grid-layer"></g>
            <g id="beam-layer"></g>
            <g id="defect-layer"></g>
            <g id="dimension-layer"></g>
            <g id="annotation-layer"></g>
            <g id="overlay-layer"></g>
        </svg>
        
        <!-- Touch Controls for Mobile -->
        <div class="touch-controls">
            <button class="touch-btn" id="touch-zoom-in">
                <svg width="24" height="24" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" fill="none"/>
                    <path d="M12 8 L12 16 M8 12 L16 12" stroke="currentColor" stroke-width="2"/>
                </svg>
            </button>
            <button class="touch-btn" id="touch-zoom-out">
                <svg width="24" height="24" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" fill="none"/>
                    <path d="M8 12 L16 12" stroke="currentColor" stroke-width="2"/>
                </svg>
            </button>
        </div>
        
        <!-- Coordinate Display -->
        <div class="coord-display">
            <span>X: <strong id="coord-x">0"</strong></span>
            <span>Y: <strong id="coord-y">0"</strong></span>
            <span>Cell: <strong id="grid-cell">--</strong></span>
        </div>
    </main>

    <!-- Status Bar -->
    <footer class="status-bar">
        <div class="status-group">
            <span class="status-item">
                <span class="label">Profile:</span>
                <span id="beam-profile">30WF210</span>
            </span>
            <span class="status-item">
                <span class="label">Length:</span>
                <span id="beam-length">44'-0"</span>
            </span>
            <span class="status-item desktop-only">
                <span class="label">Depth:</span>
                <span id="beam-depth">30.375"</span>
            </span>
            <span class="status-item desktop-only">
                <span class="label">Web:</span>
                <span id="web-thickness">0.75"</span>
            </span>
        </div>
        <div class="status-group">
            <span class="status-item">
                <span class="label">Marked:</span>
                <span id="cells-marked">0</span>
            </span>
            <span class="status-item">
                <span class="label">Inspector:</span>
                <span id="inspector">J. Smith</span>
            </span>
            <span class="status-item">
                <span id="current-time">--:--:--</span>
            </span>
        </div>
    </footer>

    <!-- Mobile Menu Overlay -->
    <div class="mobile-menu" id="mobile-menu">
        <div class="menu-header">
            <h3>Menu</h3>
            <button class="close-menu" id="close-menu">×</button>
        </div>
        <div class="menu-content">
            <a href="setup-v2.html" class="menu-item">
                <svg width="20" height="20" viewBox="0 0 20 20">
                    <circle cx="10" cy="10" r="8" stroke="currentColor" fill="none"/>
                    <circle cx="10" cy="6" r="1" fill="currentColor"/>
                    <circle cx="14" cy="10" r="1" fill="currentColor"/>
                    <circle cx="10" cy="14" r="1" fill="currentColor"/>
                    <circle cx="6" cy="10" r="1" fill="currentColor"/>
                </svg>
                Setup
            </a>
            <button class="menu-item" id="menu-save">
                <svg width="20" height="20" viewBox="0 0 20 20">
                    <path d="M3 3 L3 17 L17 17 L17 5 L15 3 Z" stroke="currentColor" fill="none"/>
                    <rect x="6" y="3" width="8" height="6" fill="currentColor"/>
                </svg>
                Save Progress
            </button>
            <button class="menu-item" id="menu-load">
                <svg width="20" height="20" viewBox="0 0 20 20">
                    <path d="M3 3 L17 3 L17 17 L3 17 Z" stroke="currentColor" fill="none"/>
                    <path d="M10 7 L10 13 M7 10 L10 7 L13 10" stroke="currentColor"/>
                </svg>
                Load Progress
            </button>
            <button class="menu-item" id="menu-export">
                <svg width="20" height="20" viewBox="0 0 20 20">
                    <path d="M10 3 L10 12 M6 8 L10 12 L14 8 M3 16 L17 16" stroke="currentColor" fill="none"/>
                </svg>
                Export
            </button>
            <div class="menu-divider"></div>
            <button class="menu-item" id="menu-help">
                <svg width="20" height="20" viewBox="0 0 20 20">
                    <circle cx="10" cy="10" r="8" stroke="currentColor" fill="none"/>
                    <text x="10" y="14" text-anchor="middle" font-size="12" fill="currentColor">?</text>
                </svg>
                Help
            </button>
        </div>
    </div>

    <script src="geometry-config.js"></script>
    <script src="visualbeam-v3.js"></script>
</body>
</html>
