<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VisualBeam Setup - Mobile Optimized</title>
    <link rel="stylesheet" href="setup-v2.css">
</head>
<body>
    <div class="setup-container">
        <!-- Header -->
        <header class="setup-header">
            <div class="header-content">
                <div class="brand">
                    <svg class="logo" width="24" height="24" viewBox="0 0 24 24">
                        <rect x="2" y="5" width="20" height="2" fill="currentColor"/>
                        <rect x="10" y="7" width="4" height="10" fill="currentColor"/>
                        <rect x="2" y="17" width="20" height="2" fill="currentColor"/>
                    </svg>
                    <span>VisualBeam Setup</span>
                </div>
                <button class="btn-proceed" id="proceed-btn">
                    Proceed to Inspection
                    <svg width="16" height="16" viewBox="0 0 16 16">
                        <path d="M6 3 L11 8 L6 13" stroke="currentColor" fill="none" stroke-width="2"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="setup-main">
            <!-- Form Section -->
            <div class="form-section">
                <div class="form-tabs">
                    <button class="tab-btn active" data-tab="project">Project</button>
                    <button class="tab-btn" data-tab="beam">Beam</button>
                    <button class="tab-btn" data-tab="geometry">Geometry</button>
                </div>

                <form id="setup-form">
                    <!-- Project Tab -->
                    <div class="tab-content active" id="project-tab">
                        <div class="form-group">
                            <label for="project-name">Project Name</label>
                            <input type="text" id="project-name" value="Bridge A-47" required>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="beam-id">Beam ID</label>
                                <input type="text" id="beam-id" value="Beam 2" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="inspector">Inspector</label>
                                <input type="text" id="inspector" value="J. Smith" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="direction">Elevation Direction</label>
                            <select id="direction">
                                <option value="north">North</option>
                                <option value="south" selected>South</option>
                                <option value="east">East</option>
                                <option value="west">West</option>
                            </select>
                        </div>
                    </div>

                    <!-- Beam Tab -->
                    <div class="tab-content" id="beam-tab">
                        <div class="form-group">
                            <label for="beam-profile">Beam Profile</label>
                            <select id="beam-profile">
                                <option value="18wf114">18" WF 114#</option>
                                <option value="21wf142">21" WF 142#</option>
                                <option value="24wf160">24" WF 160#</option>
                                <option value="30wf210" selected>30" WF 210#</option>
                                <option value="36wf300">36" WF 300#</option>
                            </select>
                        </div>

                        <div class="profile-info" id="profile-info">
                            <div class="info-row">
                                <span>Depth: <strong id="profile-depth">30.375"</strong></span>
                                <span>Weight: <strong id="profile-weight">210 lb/ft</strong></span>
                            </div>
                            <div class="info-row">
                                <span>Flange: <strong id="profile-flange">15.125" × 1.3125"</strong></span>
                                <span>Web: <strong id="profile-web">0.75"</strong></span>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="length-ft">Beam Length</label>
                                <div class="input-group">
                                    <input type="number" id="length-ft" value="44" min="0" max="100">
                                    <span class="unit">ft</span>
                                    <input type="number" id="length-in" value="0" min="0" max="11">
                                    <span class="unit">in</span>
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="checkbox-label">
                                <input type="checkbox" id="top-flange-visible" checked>
                                <span>Top Flange Visible</span>
                            </label>
                        </div>
                    </div>

                    <!-- Geometry Tab -->
                    <div class="tab-content" id="geometry-tab">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="bearing-cl-ft">Bearing C/L Spacing</label>
                                <div class="input-group">
                                    <input type="number" id="bearing-cl-ft" value="42" min="0" max="100">
                                    <span class="unit">ft</span>
                                    <input type="number" id="bearing-cl-in" value="0" min="0" max="11">
                                    <span class="unit">in</span>
                                </div>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="bearing-distance-ft">Bearing Distance from End</label>
                                <div class="input-group">
                                    <input type="number" id="bearing-distance-ft" value="1" min="0" max="10">
                                    <span class="unit">ft</span>
                                    <input type="number" id="bearing-distance-in" value="0" min="0" max="11">
                                    <span class="unit">in</span>
                                </div>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="backwall-clearance-ft">Backwall Clearance</label>
                                <div class="input-group">
                                    <input type="number" id="backwall-clearance-ft" value="0" min="0" max="2">
                                    <span class="unit">ft</span>
                                    <input type="number" id="backwall-clearance-in" value="2" min="0" max="11">
                                    <span class="unit">in</span>
                                </div>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="breastwall-ft">Breastwall Distance from Bearing</label>
                                <div class="input-group">
                                    <input type="number" id="breastwall-ft" value="2" min="0" max="10">
                                    <span class="unit">ft</span>
                                    <input type="number" id="breastwall-in" value="6" min="0" max="11">
                                    <span class="unit">in</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <!-- Preview Section -->
            <div class="preview-section">
                <div class="preview-tabs">
                    <button class="preview-tab active" data-view="elevation">Elevation</button>
                    <button class="preview-tab" data-view="section">Section</button>
                </div>

                <!-- Elevation Preview -->
                <div class="preview-container active" id="elevation-preview">
                    <svg id="elevation-svg" viewBox="0 0 800 400" preserveAspectRatio="xMidYMid meet">
                        <!-- Background -->
                        <rect width="800" height="400" fill="#f8f8f8"/>
                        
                        <!-- Grid -->
                        <defs>
                            <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
                                <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e0e0e0" stroke-width="0.5"/>
                            </pattern>
                        </defs>
                        <rect width="800" height="400" fill="url(#grid)"/>
                        
                        <!-- Abutments will be drawn here -->
                        <g id="elevation-abutments"></g>
                        
                        <!-- Beam -->
                        <g id="elevation-beam"></g>
                        
                        <!-- Bearings -->
                        <g id="elevation-bearings"></g>
                        
                        <!-- Dimensions -->
                        <g id="elevation-dimensions"></g>
                    </svg>
                </div>

                <!-- Section Preview -->
                <div class="preview-container" id="section-preview">
                    <svg id="section-svg" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid meet">
                        <!-- Background -->
                        <rect width="400" height="400" fill="#f8f8f8"/>
                        
                        <!-- Cross Section will be drawn here -->
                        <g id="section-beam"></g>
                        
                        <!-- Labels -->
                        <g id="section-labels"></g>
                    </svg>
                </div>

                <div class="preview-info">
                    <span id="preview-status">Preview updates automatically</span>
                </div>
            </div>
        </main>

        <!-- Mobile Action Bar -->
        <div class="mobile-actions">
            <button class="action-btn" id="save-config">
                <svg width="20" height="20" viewBox="0 0 20 20">
                    <path d="M3 3 L3 17 L17 17 L17 5 L15 3 Z" stroke="currentColor" fill="none"/>
                    <rect x="6" y="3" width="8" height="6" fill="currentColor"/>
                    <rect x="7" y="11" width="6" height="4" fill="currentColor"/>
                </svg>
                Save
            </button>
            <button class="action-btn" id="reset-config">
                <svg width="20" height="20" viewBox="0 0 20 20">
                    <path d="M4 10 A6 6 0 1 1 10 4" stroke="currentColor" fill="none" stroke-width="2"/>
                    <path d="M10 4 L10 8 L6 4 Z" fill="currentColor"/>
                </svg>
                Reset
            </button>
            <button class="action-btn primary" id="mobile-proceed">
                Start Inspection
                <svg width="16" height="16" viewBox="0 0 16 16">
                    <path d="M6 3 L11 8 L6 13" stroke="currentColor" fill="none" stroke-width="2"/>
                </svg>
            </button>
        </div>
    </div>

    <script src="setup-v2.js"></script>
</body>
</html>
